<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h2 id="heading">Welcome to My Website</h2>

       <img id="image" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=250&q=80" alt="Nature Image">

        <p id="text">This is a simple paragraph.</p>

        <div class="buttons">
            <button onclick="changeText()">Change Text</button>
            <button onclick="changeImage()">Change Image</button>
            <button onclick="changeColor()">Change Color</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
